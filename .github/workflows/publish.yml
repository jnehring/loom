name: publish

on:
  push:
    tags: ["v*"]          # e.g. v0.1.0, v0.2.0
  release:
    types: [published]
  workflow_dispatch:      # manual trigger from the Actions tab

jobs:
  # 1. Re-run the test suite before publishing.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: pytest -v

  # 2. Build sdist + wheel.
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tool
        run: python -m pip install --upgrade build
      - name: Update version from tag
        run: |
          if [[ $GITHUB_REF_NAME =~ ^v[0-9] ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            python -c "
          import re, sys
          content = open('pyproject.toml').read()
          updated = re.sub(r'version\s*=\s*\"[^\"]+\"', f'version = \"{sys.argv[1]}\"', content)
          open('pyproject.toml', 'w').write(updated)
            " "$VERSION"
            python -c "
          import re, sys
          content = open('loom/__init__.py').read()
          updated = re.sub(r'__version__\s*=\s*\"[^\"]+\"', f'__version__ = \"{sys.argv[1]}\"', content)
          open('loom/__init__.py', 'w').write(updated)
            " "$VERSION"
            echo "Updated version in pyproject.toml and loom/__init__.py to $VERSION"
          fi
      - name: Build distributions
        run: python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 3. Publish to PyPI using Trusted Publishing (OIDC).
  #    No API token required — configure the publisher on PyPI:
  #    https://docs.pypi.org/trusted-publishers/
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # required for OIDC
      contents: read      # required for workflow access
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
